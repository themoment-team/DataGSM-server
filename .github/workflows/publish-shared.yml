name: Publish datagsm-shared

on:
  push:
    branches: [master, feat/share-kotlin-source-to-sdk]
  workflow_dispatch:

jobs:
  generate-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - id: version
        run: |
          DATE=$(date +'%Y%m%d')
          echo "value=${DATE}-${{ github.run_number }}" >> $GITHUB_OUTPUT

  publish-jvm:
    needs: generate-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Publish JVM artifact to GitHub Packages
        run: >
          ./gradlew :datagsm-common:kspKotlin
          :datagsm-shared:publishJvmPublicationToGitHubPackagesRepository
          -PSHARED_VERSION=${{ needs.generate-version.outputs.version }}
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-js:
    needs: generate-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Compile JS artifact
        run: >
          ./gradlew :datagsm-common:kspKotlin
          :datagsm-shared:jsProductionLibraryCompileSync
          -PSHARED_VERSION=${{ needs.generate-version.outputs.version }}
      - name: Publish to npmjs.com
        run: npm publish --access public
        working-directory: datagsm-shared/build/dist/js/productionLibrary
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
