org.gradle.parallel=true
org.gradle.daemon=true
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError
org.gradle.caching=true
org.gradle.configuration-cache=true
# Kept at 'warn' (not 'fail') because the Kotlin Multiplatform plugin used by
# datagsm-shared serializes org.gradle.api.Project into the configuration cache,
# which is unsupported (~30 WARNINGs, all from pluginId org.jetbrains.kotlin.multiplatform).
# JVM service modules cache fully; only datagsm-shared tasks are partially uncached.
# Raise to 'fail' once KMP supports the configuration cache.
org.gradle.configuration-cache.problems=warn
kotlin.incremental=true
kotlin.daemon.jvmargs=-Xmx1536m
# Disabled because KmpExportProcessor writes files directly (KSP 2.x PSI invalidation
# workaround). Re-enable once that workaround is reverted. See KmpExportProcessor.process().
ksp.incremental=false
